syntax = "proto3";

package agent.tools.v1;

option go_package = "github.com/runmedev/runme/v3/api/gen/proto/go/agent/tools/v1;toolsv1";

// NotebookService defines methods the AI can use to interact with the notebook.
// This is used to generate JSON schemas that can be used to define tool calls (or potentially) MCP
// server. Using https://github.com/redpanda-data/protoc-gen-go-mcp.
//
// use the script api/proto/agent/tools/v1/build_tool_mcps.sh to build the go code with the JSONSchemas.
//
// It looks like only comments on the method get translated into the description.
service NotebookService {
  // ExecuteCode runs JavaScript in the current Runme AppKernel runtime and returns one merged
  // stdout/stderr string.
  //
  // Use ExecuteCode for every notebook or Runme action. Do not ask for dedicated notebook mutation
  // tools; instead write JavaScript that calls the runtime helpers exposed inside AppKernel:
  //   - await help() to inspect the top-level helper API.
  //   - await notebooks.help() or await notebooks.help("<method>") to inspect notebook APIs.
  //   - await notebooks.list(), await notebooks.get(), await notebooks.update(...),
  //     await notebooks.execute(...), and related helper methods to inspect and mutate notebooks.
  //   - use console.log(...) to return concise status and requested values to the user.
  //
  // Prefer small, precise JS snippets and use top-level await for async helper calls so the command
  // finishes only after notebook operations and executions complete.
  rpc ExecuteCode(ExecuteCodeRequest) returns (ExecuteCodeResponse) {}
}

message ExecuteCodeRequest {
  string code = 1;
}

message ExecuteCodeResponse {
  // output contains merged stdout/stderr in execution order.
  string output = 1;
}

message TerminateRunRequest {}

message TerminateRunResponse {}

// ToolCallInput/ToolCallOutput are used by the backend to send/receive toolcalls from chatkit.
// We bundle in the call_id and previous_response_id and send them to the client
// so that the client can send them back.
//
// While "call_id" is part of ClientToolCallItem in chatkit's data model it doesn't seem to get
// passed around on the client and back to the server so we handle it ourselves.
message ToolCallInput {
  string call_id = 1;
  string previous_response_id = 2;

  oneof input {
    ExecuteCodeRequest execute_code = 9;
  }

  reserved 3, 4, 5, 6, 7, 8;
  reserved "update_cells", "list_cells", "get_cells", "execute_cells", "terminate_run", "send_slack_message";
}

message ToolCallOutput {
  string call_id = 1;
  string previous_response_id = 2;

  oneof output {
    ExecuteCodeResponse execute_code = 11;
  }

  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_SUCCESS = 1;
    STATUS_FAILED = 2;
  }

  Status status = 6;
  // client_error will be an error message if the client had one.
  string client_error = 7;

  reserved 3, 4, 5, 8, 9, 10;
  reserved "update_cells", "list_cells", "get_cells", "execute_cells", "terminate_run", "send_slack_message";
}

// ChatkitState is used by the backend to pass state back to chatkit.
// This avoids needing to store state on the backend because we can just have the client store it.
message ChatkitState {
  string previous_response_id = 1;
  string thread_id = 2;
}

message SendSlackMessageRequest {
  string channel = 1;
  string timestamp = 2;
  string text = 3;
  repeated string file_ids = 4;
}

message SendSlackMessageResponse {
  // The error if there is one
  string error = 1;
}
