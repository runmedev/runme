schema_version = "1.1"

[task]
name = "runmedev/simple-agent"
description = "Smoke test that asks an agent to write an expected string to result.txt."
authors = []
keywords = ["runme", "harbor", "containerless", "agent"]

[metadata]
difficulty = "easy"
category = "behavior"
tags = ["runme", "harbor", "agent", "smoke"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 180.0

[environment]
build_timeout_sec = 60.0
cpus = 1
memory_mb = 512
storage_mb = 1024
gpus = 0
workdir = "/app"

[environment.env]
RUNME_HARBOR_EXPECTED = "hello from a real agent"

[verifier.env]

[solution.env]
